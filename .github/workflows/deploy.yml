name: Local Deployment with Docker Compose

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean up legacy processes (Port 8080)
        run: |
          echo "Checking for processes on port 8080..."
          # 尋找並殺掉佔用 8080 埠的行程 (例如手動執行的 java)
          fuser -k 8080/tcp || true

      - name: Stop and remove existing Docker containers
        run: |
          # 確保舊的容器完全移除
          docker compose down --remove-orphans || true

      - name: Build and Start containers
        run: |
          docker compose up --build -d

      - name: Verify Running Containers
        run: |
          docker ps
          # 檢查 8080 埠是否已經由 Docker 接手
          netstat -tunlp | grep :8080 || true
